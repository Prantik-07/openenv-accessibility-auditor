version: "1.0"
name: "accessibility-pipeline-auditor"
description: "An environment where agents patch inaccessible HTML files to pass strict WCAG compliance audits using pa11y."
tasks:
  - id: "task_1_easy_alt_text"
    description: "Fix missing alt attributes on standard image tags."
  - id: "task_2_medium_contrast"
    description: "Correct inline CSS color hex codes to pass WCAG AA contrast ratios."
  - id: "task_3_hard_aria_roles"
    description: "Inject complex ARIA roles to make a custom modal compliant."
  - id: "task_4_medium_form_labels"
    description: "Correctly associate a loose <label> tag with its corresponding input field using the 'for' attribute."
  - id: "task_5_hard_interactive_tabindex"
    description: "Inject a tabindex and role attribute into a non-semantic <div> element functioning as a dropdown trigger."